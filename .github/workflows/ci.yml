name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Ruff lint
        run: python -m ruff check .
      - name: Type check (mypy)
        run: python -m mypy

  test:
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Run hermetic tests with coverage gate
        run: >-
          python -m pytest -q -m "not live and not browser"
          --cov=agentweb --cov-report=term-missing --cov-fail-under=43
      - run: python -m build
      - run: python -m agentweb.cli audit

  public-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - name: Reject private factory modules and unexpected adapters
        run: python scripts/check_public_release.py dist/*.whl
      - name: Test the one-command installer path
        env:
          AGENTWEB_INSTALL_ROOT: ${{ runner.temp }}/agentweb-install
          AGENTWEB_BIN_DIR: ${{ runner.temp }}/agentweb-bin
        run: |
          AGENTWEB_PACKAGE_SOURCE="$(find dist -name '*.whl' -print -quit)" ./install.sh
          "$AGENTWEB_BIN_DIR/agentweb" sites
          "$AGENTWEB_BIN_DIR/agentweb" capabilities npmjs.com --query version
